# Dependabot: wöchentliche, gruppierte Dependency-Updates für alle drei
# Ökosysteme des Repos. Security-Updates laufen unabhängig davon sofort.
version: 2
updates:
  # npm-Workspaces (Root-Lockfile deckt packages/* ab).
  # Nur Minor/Patch werden gruppiert — Major-Bumps kommen als einzelne PRs,
  # damit Breaking Changes (z. B. TypeScript-Majors) bewusst und isoliert
  # geprüft werden können statt eine Sammel-Pipeline rot zu färben.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Dart-Paket
  - package-ecosystem: pub
    directory: "/dart/ductus"
    schedule:
      interval: weekly

  # GitHub Actions (hält auch die SHA-Pins aktuell)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
