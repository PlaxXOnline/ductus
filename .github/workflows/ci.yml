# CI for the Ductus monorepo: Node packages, Dart adapter,
# Flutter example apps.
name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vitest run

  # Changelog gate: changes under packages/* need a changeset — the version
  # PR generates the CHANGELOG.md entries from them automatically.
  # Skipped on main (the check's comparison base) and on the changesets bot's
  # version PRs (which consume changesets on purpose).
  changeset-check:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main' && !startsWith(github.head_ref || github.ref_name, 'changeset-release/')
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history: the check compares against origin/main.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx changeset status --since=origin/main

  # Dart counterpart to the changelog gate: pub.dev has no changesets —
  # changes under dart/ductus/ must update CHANGELOG.md in the same diff
  # (exception: changes to the CHANGELOG itself).
  dart-changelog-check:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history: the check compares against origin/main.
          fetch-depth: 0
      - name: Require CHANGELOG.md updates for dart/ductus changes
        run: |
          changed=$(git diff --name-only origin/main -- 'dart/ductus/' | grep -v '^dart/ductus/CHANGELOG\.md$' || true)
          if [ -z "$changed" ]; then
            echo "No changes under dart/ductus/ — nothing to check."
            exit 0
          fi
          if git diff --name-only origin/main -- 'dart/ductus/CHANGELOG.md' | grep -q .; then
            echo "dart/ductus/ changed and CHANGELOG.md updated — ok."
            exit 0
          fi
          echo "::error file=dart/ductus/CHANGELOG.md::dart/ductus/ was changed but CHANGELOG.md was not. Please add an entry (see RELEASING.md §5)."
          echo "Changed files:"
          echo "$changed"
          exit 1

  dart:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dart/ductus
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  flutter-analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - examples/flutter_comment_demo
          - examples/flutter_go_router_demo
    defaults:
      run:
        working-directory: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
