# CI-Vorlage für das Ductus-Monorepo: Node-Pakete, Dart-Adapter,
# Flutter-Beispiel-Apps.
name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vitest run

  # Changelog-Gate: Änderungen unter packages/* brauchen ein Changeset —
  # daraus schreibt die Version-PR die CHANGELOG.md-Einträge automatisch.
  # Übersprungen auf main (Vergleichsbasis der Prüfung) und auf den
  # Version-PRs des Changesets-Bots (die konsumieren Changesets absichtlich).
  changeset-check:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main' && !startsWith(github.head_ref || github.ref_name, 'changeset-release/')
    steps:
      - uses: actions/checkout@v7
        with:
          # Volle Historie: die Prüfung vergleicht gegen origin/main.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx changeset status --since=origin/main

  # Dart-Pendant zum Changelog-Gate: pub.dev kennt kein Changesets —
  # Änderungen unter dart/ductus/ müssen die CHANGELOG.md im selben Diff
  # mitpflegen (Ausnahme: reine CHANGELOG-Änderungen selbst).
  dart-changelog-check:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
        with:
          # Volle Historie: die Prüfung vergleicht gegen origin/main.
          fetch-depth: 0
      - name: CHANGELOG.md bei dart/ductus-Änderungen erzwingen
        run: |
          changed=$(git diff --name-only origin/main -- 'dart/ductus/' | grep -v '^dart/ductus/CHANGELOG\.md$' || true)
          if [ -z "$changed" ]; then
            echo "Keine Änderungen unter dart/ductus/ — nichts zu prüfen."
            exit 0
          fi
          if git diff --name-only origin/main -- 'dart/ductus/CHANGELOG.md' | grep -q .; then
            echo "dart/ductus/ geändert und CHANGELOG.md mitgepflegt — ok."
            exit 0
          fi
          echo "::error file=dart/ductus/CHANGELOG.md::dart/ductus/ wurde geändert, aber die CHANGELOG.md nicht. Bitte einen Eintrag ergänzen (siehe RELEASING.md §5)."
          echo "Geänderte Dateien:"
          echo "$changed"
          exit 1

  dart:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dart/ductus
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  flutter-analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - examples/flutter_comment_demo
          - examples/flutter_go_router_demo
    defaults:
      run:
        working-directory: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
