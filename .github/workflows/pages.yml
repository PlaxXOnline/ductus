# Builds the live demo from the journey template and the committed demo data
# (demo/ductus.data.json) and deploys it to GitHub Pages. The trailing slash
# on --base is mandatory: the template concatenates `${base}journeys/…`.
name: Deploy Demo

on:
  push:
    branches:
      - main
    paths:
      - templates/journey/**
      - demo/**
      - .github/workflows/pages.yml
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Assemble site from template + demo data
        run: |
          cp -R templates/journey site
          cp demo/ductus.data.json site/ductus.data.json
      # No lockfile in the template — hence npm install instead of npm ci.
      - run: npm install
        working-directory: site
      - run: npx astro build --site https://plaxxonline.github.io --base /ductus/
        working-directory: site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
