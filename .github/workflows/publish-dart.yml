# Publishes the Dart package dart/ductus to pub.dev whenever a tag matching
# "dart-vX.Y.Z" is pushed. The publish runs through the official reusable
# workflow from dart-lang/setup-dart and authenticates via OIDC (pub.dev
# automated publishing; the tag pattern "dart-v{{version}}" must be
# configured on pub.dev for this — see RELEASING.md). The package's tests
# run first as their own job.
name: Publish to pub.dev

on:
  push:
    tags:
      - 'dart-v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  test:
    name: Test dart/ductus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dart/ductus
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart test

  publish:
    name: Publish
    needs: test
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
    with:
      working-directory: dart/ductus
