# Release-Workflow für die npm-Pakete (@ductus/schema, @ductus/core,
# @ductus/adapter-dart): changesets/action pflegt bei jedem Push nach main
# den "Version Packages"-PR und publiziert nach dessen Merge via
# "npm run release" nach npm. Auth über npm Trusted Publishing (OIDC):
# kein npm-Token, stattdessen ist je Paket auf npmjs.com ein Trusted
# Publisher für diesen Workflow konfiguriert (siehe RELEASING.md §3a);
# id-token: write ist dafür zwingend. Provenance wird beim Trusted
# Publishing automatisch erzeugt.
name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

      # Trusted Publishing braucht npm >= 11.5.1 (und Node >= 22.14) — nicht
      # darauf verlassen, welche npm-Version der Runner bündelt.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
