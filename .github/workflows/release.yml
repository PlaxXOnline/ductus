# Release-Workflow für die npm-Pakete (@ductus/schema, @ductus/core,
# @ductus/adapter-dart): changesets/action pflegt bei jedem Push nach main
# den "Version Packages"-PR und publiziert nach dessen Merge via
# "npm run release" nach npm. Auth über npm Trusted Publishing (OIDC):
# kein npm-Token, stattdessen ist je Paket auf npmjs.com ein Trusted
# Publisher für diesen Workflow konfiguriert (siehe RELEASING.md §3a);
# id-token: write ist dafür zwingend. Provenance wird beim Trusted
# Publishing automatisch erzeugt.
name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

      # Trusted Publishing braucht npm >= 11.5.1 (und Node >= 22.14). Das von
      # Node 24 gebündelte npm (>= 11.16) erfüllt das. Bewusst KEIN
      # "npm install -g npm@latest": npm 12.0.0 deklariert `sigstore` nicht
      # mehr als Dependency, libnpmpublish braucht es aber für Provenance —
      # ein Registry-Install räumt das Modul weg und der Publish stirbt mit
      # MODULE_NOT_FOUND (npm/cli#9722). Der Guard schlägt fehl, falls ein
      # Runner-Image je ein zu altes npm bündeln sollte.
      - name: Verify npm supports trusted publishing (>= 11.5.1)
        run: |
          node -e '
            const v = process.argv[1].trim().split(".").map(Number);
            const ok = v[0] > 11 || (v[0] === 11 && (v[1] > 5 || (v[1] === 5 && v[2] >= 1)));
            if (!ok) { console.error(`npm ${process.argv[1].trim()} < 11.5.1 — Trusted Publishing nicht möglich`); process.exit(1); }
            console.log(`npm ${process.argv[1].trim()} >= 11.5.1 — ok`);
          ' "$(npm --version)"

      - name: Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
