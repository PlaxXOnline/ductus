# Release workflow for the npm packages (@ductus/schema, @ductus/core,
# @ductus/adapter-dart): on every push to main, changesets/action maintains
# the "Version Packages" PR and, once it is merged, publishes to npm via
# "npm run release". Auth uses npm trusted publishing (OIDC): no npm token —
# instead each package has a trusted publisher for this workflow configured
# on npmjs.com (see RELEASING.md §3a); id-token: write is mandatory for
# that. Provenance is generated automatically with trusted publishing.
#
# GitHub releases are not created by the action (createGithubReleases: false)
# but by scripts/create-github-releases.mjs — only for packages whose
# changelog entry contains real changes. The fixed grouping otherwise bumps
# all packages, and unchanged ones would get empty releases.
name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

      # Trusted publishing needs npm >= 11.5.1 (and Node >= 22.14). The npm
      # bundled with Node 24 (>= 11.16) satisfies that. Deliberately NO
      # "npm install -g npm@latest": npm 12.0.0 no longer declares `sigstore`
      # as a dependency, but libnpmpublish needs it for provenance — a
      # registry install sweeps the module away and the publish dies with
      # MODULE_NOT_FOUND (npm/cli#9722). The guard fails if a runner image
      # should ever bundle an npm that is too old.
      - name: Verify npm supports trusted publishing (>= 11.5.1)
        run: |
          node -e '
            const v = process.argv[1].trim().split(".").map(Number);
            const ok = v[0] > 11 || (v[0] === 11 && (v[1] > 5 || (v[1] === 5 && v[2] >= 1)));
            if (!ok) { console.error(`npm ${process.argv[1].trim()} < 11.5.1 — trusted publishing not possible`); process.exit(1); }
            console.log(`npm ${process.argv[1].trim()} >= 11.5.1 — ok`);
          ' "$(npm --version)"

      - name: Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub releases for changed packages
        if: steps.changesets.outputs.published == 'true'
        run: node scripts/create-github-releases.mjs
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
