# Path D — build_runner builder: runs automatically via auto_apply in
# packages that depend directly on `ductus` and writes the artifact
# ductus_builder.g.json into the project root (build_to: source).
# The synthetic input `$package$` makes the builder aggregating:
# exactly one run per package across all source files.
builders:
  journey_builder:
    import: 'package:ductus/builder.dart'
    builder_factories: ['ductusJourneyBuilder']
    build_extensions: {'$package$': ['ductus_builder.g.json']}
    auto_apply: dependents
    build_to: source
