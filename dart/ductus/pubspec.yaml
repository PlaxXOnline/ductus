name: ductus
description: >-
  Journey annotations and adapter CLI for Ductus — derive end-user
  documentation from your app's user journey, versioned with your code.
version: 0.3.0
repository: https://github.com/PlaxXOnline/ductus
issue_tracker: https://github.com/PlaxXOnline/ductus/issues

environment:
  sdk: ^3.5.0

# The annotations themselves are dependency-free; analyzer & friends are only
# needed by the adapter CLI (bin/adapter.dart) and the build_runner builder
# (path D).
dependencies:
  # Narrowed to the 13 series (NFR8 trade-off — Flutter compatibility beats
  # range width): build (<14 as of 4.0.6) and source_gen (<14 as of 4.2.3)
  # do not support analyzer 14 yet — with the 13 series both AND the meta
  # pinned by Flutter stable (analyzer 13 requires meta ^1.18.0) remain
  # resolvable. Once source_gen/build allow analyzer 14, the range can grow
  # back to `<15.0.0`.
  analyzer: ">=13.0.0 <15.0.0"
  args: ^2.7.0
  # Regular (not dev) dependencies: lib/builder.dart is imported by the
  # generated build_runner script of consumers (auto_apply: dependents).
  build: ^4.0.6
  glob: ^2.1.3
  path: ^1.9.1
  source_gen: ^4.2.3

dev_dependencies:
  build_runner: ^2.15.0
  build_test: ^3.5.11
  # Explicit floor: test/test_core allow frontend_server_client from 3.2.0,
  # which no longer runs on current Dart SDKs (it invokes the removed
  # frontend_server.dart.snapshot) — without this floor,
  # `dart pub downgrade` + `dart test` would be red.
  frontend_server_client: ^4.0.0
  lints: ^6.0.0
  test: ^1.31.2

executables:
  adapter: adapter
