name: go_router_demo
description: Ductus example - go_router derivation (path C) plus Dart annotations (path B).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^16.0.0
  # Regular dependency (not dev): the annotations are imported in lib/.
  ductus:
    path: ../../dart/ductus

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
